<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Sebastian">
    <title>World Weather</title>
    <link rel="stylesheet" href="weather.css">
</head>

<body>

    <h1>World Weather</h1>

    <div class="continent-nav">
        <a href="#africa">Africa</a> |
        <a href="#australia">Australia</a> |
        <a href="#south-america">South America</a>
    </div>

    <div class="image-container">
        <!-- Different image than example -->
        <img src="https://images.unsplash.com/photo-1500375592092-40eb2168fd21"
             alt="Cloudy sky over ocean"
             width="600">
    </div>

    <div class="weather-table">

        <div class="weather-row" id="africa">
            <div class="weather-cell-label">Africa:</div>
            <div class="weather-cell-links">
                <a href="https://www.weather.com/weather/today/l/CAIRO+EG" target="_blank">
                    Cairo, Egypt
                </a>
                <a href="https://www.weather.com/weather/today/l/NAIROBI+KE" target="_blank">
                    Nairobi, Kenya
                </a>
            </div>
        </div>

        <div class="weather-row" id="australia">
            <div class="weather-cell-label">Australia:</div>
            <div class="weather-cell-links">
                <a href="https://www.weather.com/weather/today/l/SYDNEY+AU" target="_blank">
                    Sydney, Australia
                </a>
                <a href="https://www.weather.com/weather/today/l/MELBOURNE+AU" target="_blank">
                    Melbourne, Australia
                </a>
            </div>
        </div>

        <div class="weather-row" id="south-america">
            <div class="weather-cell-label">South America:</div>
            <div class="weather-cell-links">
                <a href="https://www.weather.com/weather/today/l/BUENOS+AIRES+AR" target="_blank">
                    Buenos Aires, Argentina
                </a>
                <a href="https://www.weather.com/weather/today/l/LIMA+PE" target="_blank">
                    Lima, Peru
                </a>
            </div>
        </div>

    </div>

</body>
</html>
