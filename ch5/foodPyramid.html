<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Food Pyramid</title>
  <link rel="stylesheet" href="foodPyramid.css">
</head>
<body>
  <div class="container">
    <table>
      <caption>The Food Pyramid</caption>
      <thead>
        <tr class="header-row-top">
          <th rowspan="2" style="background-color:#cc0000; color:white; border:1px solid #ccc;">Food Group</th>
          <th colspan="2" class="serving-span">Serving Guidelines</th>
        </tr>
        <tr class="header-row-bottom">
          <th>2005-2010</th>
          <th>2011-present</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="food-group"><b>Milk Group</b><br><span>(Milk, Yogurt, Cheese)</span></td>
          <td>2-3</td>
          <td>3-4</td>
        </tr>
        <tr>
          <td class="food-group"><b>Meat Group</b><br><span>(Beef, Poultry, Fish, Beans)</span></td>
          <td>2-3</td>
          <td>5-6</td>
        </tr>
        <tr>
          <td class="food-group"><b>Fruits</b></td>
          <td>2-4</td>
          <td>2-4</td>
        </tr>
        <tr>
          <td class="food-group"><b>Vegetables</b></td>
          <td>3-5</td>
          <td>1-2</td>
        </tr>
        <tr>
          <td class="food-group"><b>Heavily Salted Snacks</b></td>
          <td>1-2</td>
          <td>3-5</td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
